name: photography_toolbox
description: "A companion app for analog photography."
publish_to: 'none'
version: 1.3.3+44

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  wakelock_plus: ^1.2.8
  flutter_local_notifications: ^19.0.0
  camera: ^0.11.0+2
  uuid: ^4.5.1
  archive: ^4.0.9
  gal: ^2.3.0

dependency_overrides:
  flutter_local_notifications_windows:
    path: windows_notifications_stub

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - LICENSE
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans.ttf
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP.ttf
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC.ttf
